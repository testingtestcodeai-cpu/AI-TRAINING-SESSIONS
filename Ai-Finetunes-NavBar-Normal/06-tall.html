<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>06 - Tall Navbar</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Lato', sans-serif; background: #f7f3ee; }

  nav {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 60px 0;
    background: #fff;
    border-bottom: 1px solid #e8e0d6;
  }

  .nav-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    padding-bottom: 16px;
    border-bottom: 1px solid #f0ebe3;
  }

  .nav-util {
    display: flex;
    gap: 20px;
    font-size: 0.75rem;
    letter-spacing: 0.06em;
    color: #999;
  }
  .nav-util a { color: #999; text-decoration: none; transition: color 0.2s; }
  .nav-util a:hover { color: #333; }

  .logo {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-decoration: none;
    gap: 4px;
  }
  .logo img { height: 52px; width: 52px; object-fit: contain; }
  .logo-text {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    font-weight: 700;
    color: #2c2416;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .logo-sub {
    font-size: 0.65rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: #b8a998;
  }

  .nav-actions {
    display: flex;
    align-items: center;
    gap: 16px;
    font-size: 0.75rem;
    letter-spacing: 0.06em;
  }
  .nav-actions a { color: #666; text-decoration: none; transition: color 0.2s; }
  .nav-actions a:hover { color: #2c2416; }

  .nav-links {
    display: flex;
    gap: 0;
    list-style: none;
    padding-top: 16px;
  }
  .nav-links li a {
    display: block;
    padding: 0 24px 16px;
    color: #555;
    text-decoration: none;
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    border-bottom: 2px solid transparent;
    transition: color 0.2s, border-color 0.2s;
  }
  .nav-links li a:hover { color: #2c2416; border-bottom-color: #c9a87a; }
  .nav-links li a.active { color: #2c2416; border-bottom-color: #c9a87a; }

  .hamburger {
    display: none;
    flex-direction: column;
    gap: 5px;
    cursor: pointer;
    background: none;
    border: none;
    padding: 4px;
  }
  .hamburger span {
    display: block;
    width: 22px;
    height: 1.5px;
    background: #555;
    transition: all 0.3s;
  }
  .hamburger.open span:nth-child(1) { transform: translateY(6.5px) rotate(45deg); }
  .hamburger.open span:nth-child(2) { opacity: 0; }
  .hamburger.open span:nth-child(3) { transform: translateY(-6.5px) rotate(-45deg); }

  .mobile-menu {
    display: none;
    flex-direction: column;
    background: #fff;
    border-top: 1px solid #f0ebe3;
    padding: 20px 40px;
  }
  .mobile-menu.open { display: flex; }
  .mobile-menu a {
    color: #555;
    text-decoration: none;
    font-size: 0.82rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 12px 0;
    border-bottom: 1px solid #f5f0ea;
    transition: color 0.2s;
  }
  .mobile-menu a:hover { color: #2c2416; }

  @media (max-width: 768px) {
    nav { padding: 20px 24px 0; }
    .nav-util, .nav-actions:not(.show), .nav-links { display: none; }
    .hamburger { display: flex; }
    .nav-top { padding-bottom: 20px; }
  }

  .demo-content { padding: 60px 40px; text-align: center; }
  .label { font-family: 'Playfair Display', serif; font-size: 0.75rem; color: #b8a998; letter-spacing: 0.14em; text-transform: uppercase; margin-bottom: 12px; }
  h2 { font-family: 'Playfair Display', serif; font-size: 2.4rem; color: #2c2416; margin-bottom: 8px; }
  p { color: #999; font-size: 0.9rem; }
</style>
</head>
<body>

<nav>
  <div class="nav-top">
    <div class="nav-util">
      <a href="#">Store Locator</a>
      <a href="#">Gifting</a>
      <a href="#">Help</a>
    </div>
    <a href="#" class="logo">
      <img src="https://raw.githubusercontent.com/testingtestcodeai-cpu/L/refs/heads/main/file_00000000d44c71fab450bdb269c872fe.png" alt="Logo">
      <span class="logo-text">Elara</span>
      <span class="logo-sub">Est. 1923</span>
    </a>
    <div class="nav-actions">
      <a href="#">Sign In</a>
      <a href="#">Wishlist</a>
      <a href="#">Cart (0)</a>
      <button class="hamburger" id="ham" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </div>
  <ul class="nav-links">
    <li><a href="#" class="active">New Arrivals</a></li>
    <li><a href="#">Women</a></li>
    <li><a href="#">Men</a></li>
    <li><a href="#">Home</a></li>
    <li><a href="#">Beauty</a></li>
    <li><a href="#">Sale</a></li>
  </ul>
</nav>

<div class="mobile-menu" id="mobileMenu">
  <a href="#">New Arrivals</a>
  <a href="#">Women</a>
  <a href="#">Men</a>
  <a href="#">Home</a>
  <a href="#">Beauty</a>
  <a href="#">Sale</a>
</div>

<div class="demo-content">
  <div class="label">Layout 06</div>
  <h2>Tall Navbar</h2>
  <p>Two-tier navigation: utility bar above, main nav below — classic retail and editorial structure.</p>
</div>

<script>
  const ham = document.getElementById('ham');
  const menu = document.getElementById('mobileMenu');
  ham.addEventListener('click', () => {
    ham.classList.toggle('open');
    menu.classList.toggle('open');
  });
</script>
</body>
</html>
