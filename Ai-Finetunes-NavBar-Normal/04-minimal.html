<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>04 - Minimal Navbar</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: #ffffff; }

  nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 48px;
    height: 60px;
    background: #fff;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 8px;
    text-decoration: none;
  }
  .logo img { height: 28px; width: 28px; object-fit: contain; opacity: 0.85; }
  .logo-text { font-size: 0.95rem; font-weight: 500; color: #111; letter-spacing: -0.01em; }

  .nav-links {
    display: flex;
    gap: 40px;
    list-style: none;
  }
  .nav-links a {
    color: #666;
    text-decoration: none;
    font-size: 0.88rem;
    font-weight: 400;
    transition: color 0.15s;
  }
  .nav-links a:hover { color: #111; }

  .hamburger {
    display: none;
    flex-direction: column;
    gap: 4px;
    cursor: pointer;
    background: none;
    border: none;
    padding: 4px;
  }
  .hamburger span {
    display: block;
    width: 20px;
    height: 1.5px;
    background: #333;
    transition: all 0.3s ease;
  }
  .hamburger.open span:nth-child(1) { transform: translateY(5.5px) rotate(45deg); }
  .hamburger.open span:nth-child(2) { opacity: 0; }
  .hamburger.open span:nth-child(3) { transform: translateY(-5.5px) rotate(-45deg); }

  .mobile-menu {
    display: none;
    flex-direction: column;
    background: #fff;
    padding: 16px 48px;
    border-top: 1px solid #f0f0f0;
  }
  .mobile-menu.open { display: flex; }
  .mobile-menu a {
    color: #555;
    text-decoration: none;
    font-size: 0.9rem;
    padding: 12px 0;
    border-bottom: 1px solid #f5f5f5;
    transition: color 0.15s;
  }
  .mobile-menu a:hover { color: #111; }

  @media (max-width: 600px) {
    .nav-links { display: none; }
    .hamburger { display: flex; }
    nav { padding: 0 24px; }
  }

  .demo-content {
    padding: 80px 48px;
    text-align: center;
    color: #999;
    font-size: 0.9rem;
  }
  h2 { color: #111; font-size: 2rem; font-weight: 300; margin-bottom: 8px; letter-spacing: -0.02em; }
</style>
</head>
<body>

<nav>
  <a href="#" class="logo">
    <img src="https://raw.githubusercontent.com/testingtestcodeai-cpu/L/refs/heads/main/file_00000000d44c71fab450bdb269c872fe.png" alt="Logo">
    <span class="logo-text">Studio</span>
  </a>
  <ul class="nav-links">
    <li><a href="#">Work</a></li>
    <li><a href="#">Process</a></li>
    <li><a href="#">About</a></li>
    <li><a href="#">Contact</a></li>
  </ul>
  <button class="hamburger" id="ham" aria-label="Menu">
    <span></span><span></span><span></span>
  </button>
</nav>

<div class="mobile-menu" id="mobileMenu">
  <a href="#">Work</a>
  <a href="#">Process</a>
  <a href="#">About</a>
  <a href="#">Contact</a>
</div>

<div class="demo-content">
  <p style="font-size:0.75rem;letter-spacing:0.12em;text-transform:uppercase;color:#bbb;margin-bottom:12px;">Layout 04</p>
  <h2>Minimal Navbar</h2>
  <p>No decoration. No borders. Just type, space, and intent.</p>
</div>

<script>
  const ham = document.getElementById('ham');
  const menu = document.getElementById('mobileMenu');
  ham.addEventListener('click', () => {
    ham.classList.toggle('open');
    menu.classList.toggle('open');
  });
</script>
</body>
</html>
