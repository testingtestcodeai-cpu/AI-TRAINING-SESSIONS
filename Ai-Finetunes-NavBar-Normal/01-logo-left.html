<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>01 - Logo Left Navbar</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Syne', sans-serif; background: #f0ede8; }

  nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 40px;
    height: 72px;
    background: #1a1a2e;
    box-shadow: 0 2px 20px rgba(0,0,0,0.3);
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
    text-decoration: none;
  }
  .logo img { height: 38px; width: 38px; object-fit: contain; border-radius: 8px; }
  .logo-text { color: #fff; font-size: 1.2rem; font-weight: 800; letter-spacing: 0.05em; }

  .nav-links {
    display: flex;
    gap: 36px;
    list-style: none;
  }
  .nav-links a {
    color: #a0aec0;
    text-decoration: none;
    font-size: 0.9rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    transition: color 0.2s;
  }
  .nav-links a:hover { color: #e2b96f; }

  .nav-cta {
    background: #e2b96f;
    color: #1a1a2e;
    border: none;
    padding: 10px 24px;
    border-radius: 6px;
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 0.85rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s, transform 0.15s;
  }
  .nav-cta:hover { background: #f5cc84; transform: translateY(-1px); }

  .hamburger {
    display: none;
    flex-direction: column;
    gap: 5px;
    cursor: pointer;
    background: none;
    border: none;
    padding: 4px;
  }
  .hamburger span {
    display: block;
    width: 26px;
    height: 2px;
    background: #fff;
    border-radius: 2px;
    transition: all 0.3s ease;
  }
  .hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
  .hamburger.open span:nth-child(2) { opacity: 0; }
  .hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

  .mobile-menu {
    display: none;
    flex-direction: column;
    background: #16213e;
    padding: 20px 40px;
    gap: 16px;
  }
  .mobile-menu.open { display: flex; }
  .mobile-menu a {
    color: #a0aec0;
    text-decoration: none;
    font-size: 1rem;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 8px 0;
    border-bottom: 1px solid #ffffff11;
    transition: color 0.2s;
  }
  .mobile-menu a:hover { color: #e2b96f; }

  @media (max-width: 768px) {
    .nav-links, .nav-cta { display: none; }
    .hamburger { display: flex; }
  }

  .demo-content {
    padding: 60px 40px;
    text-align: center;
    color: #555;
    font-size: 0.95rem;
  }
  .label {
    display: inline-block;
    background: #1a1a2e;
    color: #e2b96f;
    padding: 6px 18px;
    border-radius: 20px;
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 16px;
  }
</style>
</head>
<body>

<nav>
  <a href="#" class="logo">
    <img src="https://raw.githubusercontent.com/testingtestcodeai-cpu/L/refs/heads/main/file_00000000d44c71fab450bdb269c872fe.png" alt="Logo">
    <span class="logo-text">BRAND</span>
  </a>
  <ul class="nav-links">
    <li><a href="#">Home</a></li>
    <li><a href="#">About</a></li>
    <li><a href="#">Work</a></li>
    <li><a href="#">Contact</a></li>
  </ul>
  <button class="nav-cta">Get Started</button>
  <button class="hamburger" id="ham" aria-label="Menu">
    <span></span><span></span><span></span>
  </button>
</nav>

<div class="mobile-menu" id="mobileMenu">
  <a href="#">Home</a>
  <a href="#">About</a>
  <a href="#">Work</a>
  <a href="#">Contact</a>
</div>

<div class="demo-content">
  <div class="label">Layout 01</div>
  <h2 style="font-size:2rem;color:#1a1a2e;margin-bottom:8px;">Logo Left Navbar</h2>
  <p>Logo anchored to the left, links center-right, CTA on far right.</p>
</div>

<script>
  const ham = document.getElementById('ham');
  const menu = document.getElementById('mobileMenu');
  ham.addEventListener('click', () => {
    ham.classList.toggle('open');
    menu.classList.toggle('open');
  });
</script>
</body>
</html>
